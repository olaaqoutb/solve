  <!-- Loading spinner -->
  <div class="loading-state" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
    <div class="loading-content">
      <p>Daten werden geladen...</p>
    </div>
  </div>
  <!-- Table content -->
  <div *ngIf="!loading" class="table-content custom-option">
    <table mat-table [dataSource]="dataSource" class="table">
      <!-- Beginn Column -->
      <ng-container matColumnDef="beginn" class="coulmn-width">
        <mat-header-cell *matHeaderCellDef id="cell-height"
          >Beginn</mat-header-cell
        >
        <mat-cell *matCellDef="let element">
          <!--{{ absence.startDate }} - {{ absence.startTime }} -->
          {{ element.login | date: "dd.MM.yyyy HH:mm" }}
        </mat-cell>
      </ng-container>

      <!-- Ende Column -->
      <ng-container matColumnDef="ende">
        <mat-header-cell *matHeaderCellDef>Ende</mat-header-cell>
        <mat-cell *matCellDef="let element">
          <!--{{ absence.endDate }} - {{ absence.endTime }}-->
          {{ element.logoff | date: "dd.MM.yyyy HH:mm" }}
        </mat-cell>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef></mat-header-cell>
        <mat-cell *matCellDef="let element" class="actions-cell">
          <button
            (click)="
              selectAbsence(element.id, element); $event.stopPropagation()
            "
            aria-label="Edit absence"
            class="icon-calendar"
          >
            <mat-icon class="icon">calendar_today</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <!-- Change the selected-row check from uniqueId to element.id -->
<mat-row
  *matRowDef="let element; columns: displayedColumns"
  (click)="selectAbsence(element.id, element)"
  class="hover-highlight"
  [ngClass]="{
    'row-past': getRowDateStatus(element) === 'row-past',
    'selected-row': selectedAbsenceId === element.id
  }"
></mat-row>
    </table>
    <!-- Empty state -->
    <div *ngIf="dataSource.length === 0" class="empty-state">
      <mat-icon class="empty-icon">event_busy</mat-icon>
      <p>Keine Abwesenheiten gefunden</p>
    </div>
  </div>
</div>
