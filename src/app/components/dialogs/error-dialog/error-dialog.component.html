<h2 mat-dialog-title class="custom-dialog-title">{{ data.title }}</h2>
<mat-dialog-content>
  <div class="message-content">{{ formatDetail(data.detail) }}</div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close class="close-button">Schließen</button>
</mat-dialog-actions>
